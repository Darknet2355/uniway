<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"/>
  <title>Kyambogo Campus Navigator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: linear-gradient(135deg, #0d2b4e, #1a4a7a);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 15px;
    }
    
    .container {
      max-width: 600px;
      width: 100%;
      display: flex;
      justify-content: center;
    }
    
    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 30px;
      padding: 25px 20px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.2);
      text-align: center;
      position: relative;
      overflow: hidden;
      width: 100%;
    }
    
    /* Decorative background */
    .card::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,215,0,0.03) 0%, transparent 70%);
      z-index: 0;
    }
    
    .logo-section {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 0 auto 20px;
      background: rgba(255, 255, 255, 0.05);
      padding: 10px 20px;
      border-radius: 50px;
      border: 1px solid rgba(255, 215, 0, 0.2);
      backdrop-filter: blur(5px);
      width: fit-content;
      max-width: 100%;
    }
    
    .university-logo {
      width: 45px;
      height: 45px;
      background: white;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      border: 2px solid #ffd700;
      flex-shrink: 0;
    }
    
    .university-logo svg {
      width: 100%;
      height: 100%;
    }
    
    .logo-text-section {
      text-align: left;
    }
    
    .logo-main-text {
      font-size: 0.9rem;
      font-weight: 600;
      color: #ffd700;
      line-height: 1.2;
      white-space: nowrap;
    }
    
    .logo-sub-text {
      font-size: 0.6rem;
      opacity: 0.8;
      letter-spacing: 1px;
      text-transform: uppercase;
      white-space: nowrap;
    }
    
    .content-section {
      position: relative;
      z-index: 1;
    }
    
    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 5px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }
    
    .subtitle {
      font-size: 1.1rem;
      margin-bottom: 25px;
      opacity: 0.9;
      color: #ffd700;
    }
    
    .features {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 25px 0;
      flex-wrap: wrap;
      background: rgba(0, 0, 0, 0.2);
      padding: 15px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .feature-item {
      text-align: center;
      flex: 1;
      min-width: 70px;
    }
    
    .feature-item i {
      font-size: 1.6rem;
      color: #ffd700;
      margin-bottom: 5px;
    }
    
    .feature-item span {
      display: block;
      font-size: 0.7rem;
      opacity: 0.8;
    }
    
    .btn-start {
      padding: 14px 40px;
      font-size: 1.2rem;
      border-radius: 50px;
      transition: all 0.3s ease;
      background: #ffd700;
      color: #0d2b4e;
      border: none;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 15px auto 0;
      box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
      position: relative;
      z-index: 1;
      display: inline-block;
      width: auto;
      min-width: 250px;
    }
    
    .btn-start:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(255, 215, 0, 0.6);
      background: #ffed4a;
    }
    
    .btn-start i {
      margin-right: 8px;
    }
    
    .footer-note {
      margin-top: 20px;
      font-size: 0.7rem;
      opacity: 0.6;
      position: relative;
      z-index: 1;
      padding-top: 15px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .stats-badge {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 15px 0;
      font-size: 0.8rem;
      flex-wrap: wrap;
    }
    
    .stats-badge span {
      background: rgba(255, 215, 0, 0.1);
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid rgba(255, 215, 0, 0.3);
    }
    
    .stats-badge i {
      color: #ffd700;
      margin-right: 5px;
    }
    
    /* Mobile Specific */
    @media (max-width: 480px) {
      body {
        padding: 10px;
      }
      
      .card {
        padding: 20px 15px;
      }
      
      .logo-section {
        padding: 8px 15px;
        gap: 10px;
        margin: 0 auto 15px;
      }
      
      .university-logo {
        width: 38px;
        height: 38px;
        padding: 6px;
      }
      
      .logo-main-text {
        font-size: 0.8rem;
      }
      
      .logo-sub-text {
        font-size: 0.5rem;
      }
      
      h1 {
        font-size: 1.6rem;
      }
      
      .subtitle {
        font-size: 0.9rem;
        margin-bottom: 20px;
      }
      
      .features {
        padding: 12px;
        gap: 8px;
        margin: 20px 0;
      }
      
      .feature-item i {
        font-size: 1.3rem;
      }
      
      .feature-item span {
        font-size: 0.65rem;
      }
      
      .btn-start {
        padding: 12px 25px;
        font-size: 1rem;
        min-width: 200px;
      }
      
      .stats-badge {
        gap: 10px;
        font-size: 0.7rem;
      }
      
      .stats-badge span {
        padding: 4px 10px;
      }
    }
    
    /* Small phones */
    @media (max-width: 360px) {
      h1 {
        font-size: 1.4rem;
      }
      
      .logo-section {
        padding: 6px 12px;
      }
      
      .university-logo {
        width: 32px;
        height: 32px;
        padding: 5px;
      }
      
      .logo-main-text {
        font-size: 0.7rem;
      }
      
      .btn-start {
        min-width: 180px;
        font-size: 0.9rem;
        padding: 10px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <!-- Logo Section - Perfectly Centered -->
      <div class="logo-section">
        <div class="university-logo">
          <svg viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="45" fill="#0d2b4e" stroke="#ffd700" stroke-width="3"/>
            <text x="50" y="58" text-anchor="middle" fill="#ffd700" font-size="14" font-weight="bold">KYU</text>
            <text x="50" y="75" text-anchor="middle" fill="white" font-size="6" font-weight="bold">EST. 2003</text>
            <path d="M30 40 L50 25 L70 40 L70 60 L50 75 L30 60 Z" fill="none" stroke="#ffd700" stroke-width="2"/>
          </svg>
        </div>
        <div class="logo-text-section">
          <div class="logo-main-text">KYAMBOGO UNIVERSITY</div>
          <div class="logo-sub-text">KNOWLEDGE AND SKILLS FOR SERVICE</div>
        </div>
      </div>
      
      <!-- Content Section -->
      <div class="content-section">
        <h1>Campus Navigator</h1>
        <div class="subtitle">Find Your Way Around Campus</div>
        
        <div class="stats-badge">
          <span><i class="fas fa-map-marker-alt"></i> 50+ Locations</span>
          <span><i class="fas fa-clock"></i> Real-time GPS</span>
        </div>
        
        <div class="features">
          <div class="feature-item">
            <i class="fas fa-location-dot"></i>
            <span>GPS Tracking</span>
          </div>
          <div class="feature-item">
            <i class="fas fa-route"></i>
            <span>Walking Routes</span>
          </div>
          <div class="feature-item">
            <i class="fas fa-clock"></i>
            <span>Est. Time</span>
          </div>
          <div class="feature-item">
            <i class="fas fa-volume-up"></i>
            <span>Voice Guide</span>
          </div>
        </div>
        
        <a href="/home" class="btn btn-start">
          <i class="fas fa-compass"></i> START NAVIGATION
        </a>
        
        <div class="footer-note">
          <i class="fas fa-map-pin"></i> Kyambogo University • Kampala
        </div>
      </div>
    </div>
  </div>
</body>
</html>
